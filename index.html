<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEOGEN AI - Futuristic Generator</title>
    <meta name="theme-color" content="#050510">
    <meta name="description" content="AI Image Generator for Education, Comics, and Hobbies.">
    
    <!-- PWA MANIFEST (Inline Data URI) -->
    <link rel="manifest" href='data:application/manifest+json;base64,ewogICJuYW1lIjogIk5FT0dFTiBBSSIsCiAgInNob3J0X25hbWUiOiAiTkVPR0VOIiwKICAic3RhcnRfdXJsIjogIi4iLAogICJkaXNwbGF5IjogInN0YW5kYWxvbmUiLAogICJiYWNrZ3JvdW5kX2NvbG9yIjogIiMwNTA1MTAiLAogICJ0aGVtZV9jb2xvciI6ICIjMDA1N2ZmIiwKICAiaWNvbnMiOiBbCiAgICB7CiAgICAgICJzcmMiOiAiaHR0cHM6Ly9hcGkuaWNvmlmeS5jb20vdjIvZW1vamlzLzdmMzY5YmUzLWFjYTctNDZiMS1hMGIyLTBjZmQ1ZTc5YmY5NS5zdmciLAogICAgICAic2l6ZXMiOiAiNTEyeDUxMiIsCiAgICAgICJ0eXBlIjogImltYWdlL3N2Zyt4bWwiCiAgICB9CiAgXQp9'>
    <link rel="apple-touch-icon" href="https://api.iconify.design/mdi:robot-excited.svg?color=%2300d4ff">

    <style>
        /* --- CORE FUTURISTIC STYLES --- */
        :root {
            --bg-dark: #050510;
            --panel-bg: rgba(20, 20, 35, 0.7);
            --primary: #00d4ff; /* Cyan Neon */
            --secondary: #b026ff; /* Purple Neon */
            --text-main: #e0e0e0;
            --text-muted: #8888aa;
            --glass-border: 1px solid rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        
        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(176, 38, 255, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(0, 212, 255, 0.15) 0%, transparent 40%);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 260px;
            background: rgba(10, 10, 20, 0.95);
            backdrop-filter: blur(10px);
            border-right: var(--glass-border);
            display: flex;
            flex-direction: column;
            padding: 20px;
            transition: transform 0.3s ease;
            z-index: 100;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 2px;
            color: white;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
            text-shadow: 0 0 10px var(--primary);
        }
        
        .logo svg { width: 32px; height: 32px; fill: var(--primary); }

        .nav-menu { list-style: none; flex: 1; }
        .nav-item {
            padding: 12px 15px;
            margin-bottom: 8px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            color: var(--text-muted);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .nav-item:hover, .nav-item.active {
            background: linear-gradient(90deg, rgba(0, 212, 255, 0.1), transparent);
            color: var(--primary);
            border-left: 3px solid var(--primary);
        }

        .settings-box {
            border-top: var(--glass-border);
            padding-top: 15px;
            font-size: 12px;
        }
        .settings-box label { display: block; margin-bottom: 5px; color: var(--text-muted); }
        .api-input {
            width: 100%;
            background: #000;
            border: 1px solid #333;
            color: var(--primary);
            padding: 8px;
            border-radius: 4px;
            font-size: 11px;
        }

        /* --- MAIN CONTENT --- */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            position: relative;
        }

        .top-bar {
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: var(--glass-border);
            background: rgba(5, 5, 16, 0.8);
        }

        .burger { display: none; cursor: pointer; font-size: 24px; color: white; }

        .workspace {
            display: flex;
            flex-wrap: wrap;
            height: calc(100vh - 60px);
        }

        /* --- CONTROLS PANEL --- */
        .controls {
            width: 350px;
            padding: 20px;
            overflow-y: auto;
            border-right: var(--glass-border);
            background: rgba(0,0,0,0.2);
        }

        .control-group { margin-bottom: 20px; }
        .control-group label { display: block; margin-bottom: 8px; font-size: 13px; font-weight: 600; color: var(--secondary); text-transform: uppercase; }
        
        textarea, input[type="text"], select {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 10px;
            border-radius: 6px;
            font-size: 14px;
            resize: none;
            outline: none;
            transition: 0.3s;
        }
        textarea:focus, input:focus, select:focus { border-color: var(--primary); box-shadow: 0 0 8px rgba(0, 212, 255, 0.2); }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            color: white;
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.3);
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0, 212, 255, 0.5); }
        .btn-secondary { background: transparent; border: 1px solid var(--text-muted); color: var(--text-muted); }
        .btn-secondary:hover { border-color: white; color: white; }

        .toggles { display: flex; gap: 10px; margin-bottom: 15px; }
        .toggle-btn {
            flex: 1;
            padding: 8px;
            font-size: 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-muted);
            border-radius: 4px;
            cursor: pointer;
            text-align: center;
        }
        .toggle-btn.active { background: rgba(0, 212, 255, 0.2); color: var(--primary); border-color: var(--primary); }

        /* --- PREVIEW AREA --- */
        .preview-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background-image: radial-gradient(#1a1a2e 1px, transparent 1px);
            background-size: 20px 20px;
            position: relative;
        }

        .canvas-container {
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            border: 1px solid #333;
            max-width: 100%;
            max-height: 80vh;
            overflow: hidden;
            border-radius: 8px;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        canvas { max-width: 100%; max-height: 100%; display: block; }
        
        .status-bar {
            margin-top: 15px;
            font-size: 13px;
            color: var(--text-muted);
            min-height: 20px;
            text-align: center;
        }

        /* --- MOBILE RESPONSIVE --- */
        @media (max-width: 768px) {
            .sidebar { position: fixed; left: -260px; height: 100%; box-shadow: 5px 0 20px rgba(0,0,0,0.5); }
            .sidebar.open { left: 0; }
            .burger { display: block; }
            .workspace { flex-direction: column; overflow-y: auto; height: auto; }
            .controls { width: 100%; border-right: none; border-bottom: var(--glass-border); }
            .preview-area { min-height: 400px; }
        }
    </style>
</head>
<body>

    <!-- SIDEBAR -->
    <nav class="sidebar" id="sidebar">
        <div class="logo">
            <svg viewBox="0 0 24 24">
                <path d="M12,2A10,10 0 0,0 2,12A10,10 0 0,0 12,22A10,10 0 0,0 22,12A10,10 0 0,0 12,2M12,4A8,8 0 0,1 20,12A8,8 0 0,1 12,20A8,8 0 0,1 4,12A8,8 0 0,1 12,4M12,6A6,6 0 0,0 6,12A6,6 0 0,0 12,18A6,6 0 0,0 18,12A6,6 0 0,0 12,6M12,8A4,4 0 0,1 16,12A4,4 0 0,1 12,16A4,4 0 0,1 8,12A4,4 0 0,1 12,8Z" />
            </svg>
            NEOGEN
        </div>
        <ul class="nav-menu">
            <li class="nav-item active" onclick="switchMode('home')">🏠 Home Studio</li>
            <li class="nav-item" onclick="switchMode('edu')">🎓 Education</li>
            <li class="nav-item" onclick="switchMode('comic')">📚 Comic Maker</li>
            <li class="nav-item" onclick="switchMode('hobby')">🎮 Hobby & RPG</li>
        </ul>
        <div class="settings-box">
            <label>⚙️ Hugging Face API Key</label>
            <input type="text" id="hf-api-key" class="api-input" placeholder="Paste hf_xxxxx..." onchange="saveSettings()">
            <div style="margin-top:10px; font-size:10px; color:#555;">Get free key at huggingface.co/settings/tokens</div>
        </div>
    </nav>

    <!-- MAIN CONTENT -->
    <main class="main-content">
        <div class="top-bar">
            <div class="burger" onclick="toggleSidebar()">☰</div>
            <h3 id="page-title" style="margin:0; font-weight:300;">HOME STUDIO</h3>
            <div style="width:24px;"></div> <!-- Spacer -->
        </div>

        <div class="workspace">
            <!-- CONTROLS -->
            <div class="controls">
                <!-- Prompt Input -->
                <div class="control-group">
                    <label>Your Idea</label>
                    <textarea id="prompt-input" rows="3" placeholder="Describe your imagination... (e.g., A cyberpunk cat sitting on a neon roof)"></textarea>
                </div>

                <!-- Styles -->
                <div class="control-group">
                    <label>Style Preset</label>
                    <select id="style-select">
                        <option value="none">General / No Style</option>
                        <option value="manga">Manga / Anime</option>
                        <option value="retro">80s Retro Poster</option>
                        <option value="vector">Flat Vector / Infographic</option>
                        <option value="3d">Realistic 3D Render</option>
                        <option value="pixel">Pixel Art</option>
                        <option value="watercolor">Watercolor Painting</option>
                    </select>
                </div>

                <!-- Text Overlay (Canvas Feature) -->
                <div class="control-group">
                    <label>Caption / Title Overlay</label>
                    <input type="text" id="overlay-text" placeholder="Type text to burn into image...">
                </div>

                <!-- Toggles -->
                <div class="control-group">
                    <label>Enhancements</label>
                    <div class="toggles">
                        <div class="toggle-btn" id="btn-enhance" onclick="toggleFeature('enhance')">✨ Magic Enhancer</div>
                        <div class="toggle-btn" id="btn-clean" onclick="toggleFeature('clean')">🧹 Auto-Clean</div>
                    </div>
                </div>

                <!-- Negative Prompt Manual -->
                <div class="control-group">
                    <label>Negative Prompt (What to avoid)</label>
                    <textarea id="neg-prompt" rows="2" placeholder="blurry, ugly, bad anatomy..."></textarea>
                </div>

                <!-- Actions -->
                <button class="btn btn-primary" onclick="generateImage()">GENERATE VISION</button>
                <button class="btn btn-secondary" onclick="downloadCanvas()">💾 Download Result</button>
            </div>

            <!-- PREVIEW -->
            <div class="preview-area">
                <div class="canvas-container">
                    <canvas id="mainCanvas" width="800" height="600"></canvas>
                </div>
                <div class="status-bar" id="status-text">Ready to create.</div>
            </div>
        </div>
    </main>

    <!-- JAVASCRIPT LOGIC -->
    <script>
        // --- STATE & VARIABLES ---
        let apiKey = localStorage.getItem('neogen_hf_key') || '';
        document.getElementById('hf-api-key').value = apiKey;

        let features = {
            enhance: false,
            clean: false
        };

        // Style Dictionaries
        const styleDict = {
            'none': '',
            'manga': ', anime style, manga, vibrant colors, detailed lineart, cel shading',
            'retro': ', 80s retro poster, vintage style, neon colors, synthwave aesthetic, grain',
            'vector': ', flat vector art, minimalist, infographic style, clean lines, solid colors',
            '3d': ', 3d render, unreal engine 5, octane render, photorealistic, volumetric lighting',
            'pixel': ', pixel art, 16-bit, retro game style',
            'watercolor': ', watercolor painting, artistic, soft edges, pastel colors'
        };

        const negativeDefaults = "blurry, ugly, distorted, low quality, bad anatomy, extra limbs, watermark, text";

        // --- NAVIGATION & UI ---
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        function switchMode(mode) {
            // Update Menu Active State
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            event.currentTarget.classList.add('active');

            // Update Title
            const titleEl = document.getElementById('page-title');
            const promptEl = document.getElementById('prompt-input');
            const styleEl = document.getElementById('style-select');

            if(mode === 'home') {
                titleEl.innerText = "HOME STUDIO";
                styleEl.value = 'none';
            } else if (mode === 'edu') {
                titleEl.innerText = "EDUCATION LAB";
                styleEl.value = 'vector'; // Default for Education
                promptEl.placeholder = "e.g. Diagram of photosynthesis process, clean white background...";
            } else if (mode === 'comic') {
                titleEl.innerText = "COMIC STUDIO";
                styleEl.value = 'manga'; // Default for Comic
                promptEl.placeholder = "e.g. A dynamic superhero action pose, flying in the city...";
            } else if (mode === 'hobby') {
                titleEl.innerText = "HOBBY & RPG";
                styleEl.value = '3d'; // Default for Hobby
                promptEl.placeholder = "e.g. Fantasy warrior elf with glowing sword, epic armor...";
            }

            // Mobile: Close sidebar after click
            if(window.innerWidth < 768) {
                document.getElementById('sidebar').classList.remove('open');
            }
        }

        function toggleFeature(feat) {
            features[feat] = !features[feat];
            const btnId = feat === 'enhance' ? 'btn-enhance' : 'btn-clean';
            const btn = document.getElementById(btnId);
            
            if(features[feat]) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        }

        function saveSettings() {
            const key = document.getElementById('hf-api-key').value.trim();
            localStorage.setItem('neogen_hf_key', key);
            apiKey = key;
            alert("API Key Saved!");
        }

        // --- CORE GENERATION LOGIC ---
        async function generateImage() {
            if(!apiKey) {
                alert("Please enter your Hugging Face API Key in the sidebar first!");
                return;
            }

            const rawPrompt = document.getElementById('prompt-input').value;
            if(!rawPrompt) {
                alert("Please enter a prompt!");
                return;
            }

            // 1. Construct Prompt
            let finalPrompt = rawPrompt;
            
            // Add Style
            const styleVal = document.getElementById('style-select').value;
            if(styleDict[styleVal]) {
                finalPrompt += styleDict[styleVal];
            }

            // Add Magic Enhancer
            if(features.enhance) {
                finalPrompt += ", high resolution, 8k, masterpiece, cinematic lighting, sharp focus, highly detailed";
            }

            // 2. Construct Negative Prompt
            let negPrompt = document.getElementById('neg-prompt').value;
            if(features.clean) {
                if(negPrompt) negPrompt += ", " + negativeDefaults;
                else negPrompt = negativeDefaults;
            }

            // UI Update
            const statusEl = document.getElementById('status-text');
            const canvas = document.getElementById('mainCanvas');
            const ctx = canvas.getContext('2d');
            const overlayText = document.getElementById('overlay-text').value;

            // Clear Canvas & Draw Loading Placeholder
            ctx.fillStyle = "#111";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#00d4ff";
            ctx.font = "20px Arial";
            ctx.textAlign = "center";
            statusEl.innerText = "Connecting to Neural Network...";
            ctx.fillText("GENERATING...", canvas.width/2, canvas.height/2);

            try {
                // 3. Call Hugging Face API
                // Model: Stability AI SDXL (Good general purpose)
                const modelId = "stabilityai/stable-diffusion-xl-base-1.0";
                const response = await fetch(`https://api-inference.huggingface.co/models/${modelId}`, {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${apiKey}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        inputs: finalPrompt,
                        parameters: {
                            negative_prompt: negPrompt
                        }
                    })
                });

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.error || "Failed to generate");
                }

                // 4. Handle Image Blob
                const blob = await response.blob();
                const imgUrl = URL.createObjectURL(blob);
                
                const img = new Image();
                img.crossOrigin = "Anonymous"; // Vital for Canvas
                img.src = imgUrl;

                img.onload = () => {
                    // Resize canvas to match image aspect ratio but keep within max bounds
                    const maxW = 1024;
                    const maxH = 1024;
                    let newW = img.width;
                    let newH = img.height;

                    if (newW > maxW || newH > maxH) {
                        const ratio = Math.min(maxW / newW, maxH / newH);
                        newW *= ratio;
                        newH *= ratio;
                    }

                    canvas.width = newW;
                    canvas.height = newH;

                    // Draw Image
                    ctx.drawImage(img, 0, 0, newW, newH);

                    // 5. Draw Overlay Text (Feature 4)
                    if (overlayText) {
                        const fontSize = Math.floor(newW / 15); // Dynamic font size
                        ctx.font = `bold ${fontSize}px Arial`;
                        ctx.textAlign = "center";
                        ctx.textBaseline = "bottom";
                        
                        const x = newW / 2;
                        const y = newH - (newH * 0.05); // 5% from bottom

                        // Text Shadow/Outline
                        ctx.lineWidth = fontSize / 8;
                        ctx.strokeStyle = "black";
                        ctx.strokeText(overlayText, x, y);
                        
                        // Text Fill
                        ctx.fillStyle = "white";
                        ctx.fillText(overlayText, x, y);
                    }

                    statusEl.innerText = "Generation Complete.";
                    URL.revokeObjectURL(imgUrl); // Cleanup memory
                };

            } catch (error) {
                statusEl.innerText = "Error: " + error.message;
                console.error(error);
            }
        }

        // --- DOWNLOAD LOGIC ---
        function downloadCanvas() {
            const canvas = document.getElementById('mainCanvas');
            // Check if canvas is empty (simple check: draw something first? No, just assume valid)
            // Create fake link
            const link = document.createElement('a');
            link.download = `neogen-${Date.now()}.jpg`;
            link.href = canvas.toDataURL('image/jpeg', 0.9);
            link.click();
        }

        // Initial Setup
        // Draw a placeholder on load
        window.onload = () => {
            const ctx = document.getElementById('mainCanvas').getContext('2d');
            ctx.fillStyle = "#111";
            ctx.fillRect(0,0,800,600);
            ctx.fillStyle = "#333";
            ctx.font = "20px Arial";
            ctx.textAlign = "center";
            ctx.fillText("NEOGEN AI", 400, 290);
            ctx.font = "14px Arial";
            ctx.fillStyle = "#555";
            ctx.fillText("Enter prompt and click Generate", 400, 320);
        };

        // Register Simple Service Worker for PWA (Basic)
        if ('serviceWorker' in navigator) {
            // We don't have a separate sw.js file, so we skip actual SW registration 
            // which requires a file. But the Manifest handles "Add to Homescreen".
            console.log("PWA Manifest Active via Data URI");
        }

    </script>
</body>
</html>
